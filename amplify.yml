version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # Next.js SSR build output. Amplify auto-detects the Next.js framework and
    # provisions the managed compute (WEB_COMPUTE) runtime from this.
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
